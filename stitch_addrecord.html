<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LEDGER.SHOCK - 新增记录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&amp;family=Epilogue:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#FFD60A",
                        "on-primary": "#000000",
                        "secondary": "#006d77",
                        "background": "#000000",
                        "surface": "#131313",
                        "surface-variant": "#1f1f1f",
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Epilogue"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Epilogue', sans-serif; background-color: #000000; color: #FFFFFF; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hard-echo {
            box-shadow: 4px 4px 0px 0px #006D77;
        }
        .hard-echo-yellow {
            box-shadow: 4px 4px 0px 0px #FFD60A;
        }
        /* Sharp non-parallel quads */
        .quad-skew-right { clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); }
        .quad-skew-left { clip-path: polygon(0% 0%, 90% 0%, 100% 100%, 10% 100%); }
        
        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-black overflow-hidden min-h-screen flex items-end">
<!-- TopAppBar (Shared) -->
<header class="bg-black text-primary font-headline font-bold -skew-x-6 uppercase tracking-tighter fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 border-b-4 border-secondary shadow-[4px_4px_0px_0px_rgba(0,109,119,1)]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-white" data-icon="menu">menu</span>
<h1 class="text-3xl font-black text-primary -rotate-3 italic">LEDGER.SHOCK</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined hover:skew-x-2 transition-transform active:translate-y-1" data-icon="search">search</span>
</div>
</header>
<!-- Overlay / Backdrop -->
<div class="fixed inset-0 bg-black/80 z-40"></div>
<!-- AddRecordSheet (Bottom Pop-up) -->
<div class="relative w-full max-w-2xl mx-auto z-50 animate-slide-up mb-20">
<div class="bg-black border-t-8 border-secondary p-8 shadow-[0_-10px_40px_rgba(0,109,119,0.3)]">
<!-- Header Title -->
<div class="flex items-center gap-4 mb-8 -rotate-2">
<div class="bg-primary text-black px-6 py-1 font-headline font-black text-xl quad-skew-right">记账</div>
<h2 class="text-white font-headline text-3xl font-bold italic tracking-tighter uppercase">新增记录</h2>
</div>
<div class="space-y-8">
<!-- TypeSwitch & Date -->
<div class="flex flex-wrap gap-6 items-center">
<div class="flex bg-surface-variant p-1">
<button class="bg-primary text-black font-headline font-black px-10 py-3 quad-skew-right transition-transform active:scale-95">支出</button>
<button class="text-white font-headline font-black px-10 py-3 hover:text-primary transition-colors">收入</button>
</div>
<button class="flex items-center gap-2 bg-secondary text-white px-6 py-3 quad-skew-right hard-echo transition-transform hover:translate-y-[-2px]">
<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="font-headline font-bold">2023年10月24日</span>
</button>
</div>
<!-- AmountInput -->
<div class="relative group">
<div class="absolute left-0 bottom-0 w-full h-1 bg-secondary group-focus-within:bg-primary transition-colors -skew-x-6"></div>
<div class="flex items-baseline gap-4 py-4">
<span class="text-4xl font-headline font-black text-primary italic">¥</span>
<input class="bg-transparent border-none focus:ring-0 text-6xl font-headline font-black text-white placeholder-white/20 w-full outline-none" placeholder="0.00" type="number"/>
</div>
</div>
<!-- CategoryPicker -->
<div class="space-y-4">
<label class="block text-primary font-headline font-bold uppercase tracking-widest text-sm">分类</label>
<div class="flex flex-wrap gap-3">
<button class="bg-white text-black px-6 py-2 font-body font-bold quad-skew-right hover:bg-primary transition-colors">餐饮</button>
<button class="bg-secondary text-white px-6 py-2 font-body font-bold quad-skew-right hover:bg-primary hover:text-black transition-colors">交通</button>
<button class="bg-secondary text-white px-6 py-2 font-body font-bold quad-skew-right hover:bg-primary hover:text-black transition-colors">购物</button>
<button class="bg-secondary text-white px-6 py-2 font-body font-bold quad-skew-right hover:bg-primary hover:text-black transition-colors">娱乐</button>
<button class="bg-secondary text-white px-6 py-2 font-body font-bold quad-skew-right hover:bg-primary hover:text-black transition-colors">医疗</button>
<div class="flex items-center border-2 border-dashed border-secondary px-4 py-1 quad-skew-right">
<input class="bg-transparent border-none focus:ring-0 text-white placeholder-white/30 text-sm font-body w-24" placeholder="自定义..." type="text"/>
<button class="text-primary"><span class="material-symbols-outlined text-lg" data-icon="add_box">add_box</span></button>
</div>
</div>
</div>
<!-- NoteInput -->
<div class="space-y-4">
<label class="block text-primary font-headline font-bold uppercase tracking-widest text-sm">备注</label>
<div class="bg-surface-variant p-4 border-l-8 border-primary">
<textarea class="bg-transparent border-none focus:ring-0 text-white placeholder-white/20 w-full font-body resize-none" placeholder="输入备注信息..." rows="2"></textarea>
</div>
</div>
<!-- Actions -->
<div class="flex gap-6 pt-4 pb-4">
<button class="flex-1 border-4 border-white text-white font-headline font-black py-4 uppercase tracking-widest hover:bg-white hover:text-black transition-all quad-skew-left">
                    取消
                </button>
<button class="flex-1 bg-primary text-black font-headline font-black py-4 uppercase tracking-widest hard-echo hover:translate-x-1 hover:translate-y-1 hover:shadow-none transition-all quad-skew-left">
                    确认保存
                </button>
</div>
</div>
</div>
</div>
<!-- BottomNavBar (Shared) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-stretch overflow-hidden bg-black text-primary font-headline font-bold uppercase text-xs border-t-4 border-secondary h-20 z-50">
<div class="flex flex-col items-center justify-center bg-primary text-black quad-skew-left px-8 py-1 h-full active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="text-[10px] mt-1">账本</span>
</div>
<div class="flex flex-col items-center justify-center text-white/50 h-full hover:text-white transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="query_stats">query_stats</span>
<span class="text-[10px] mt-1">统计</span>
</div>
<div class="flex flex-col items-center justify-center text-white/50 h-full hover:text-white transition-colors active:scale-95">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-[10px] mt-1">设置</span>
</div>
</nav>
<!-- Background Decoration -->
<div class="fixed top-20 left-10 opacity-10 pointer-events-none -rotate-12 z-0">
<h3 class="text-9xl font-black text-white italic leading-none">CASH<br/>REBEL</h3>
</div>
<div class="fixed bottom-40 right-[-100px] opacity-20 pointer-events-none rotate-90 z-0">
<h3 class="text-[12rem] font-black text-secondary italic leading-none">SHOCK</h3>
</div>
</body></html>
