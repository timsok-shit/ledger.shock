<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Account Book - 记一笔</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#85cfff;
  --secondary:#feda57;
  --bg:#0e0e0e;
  --surface:#1a1a1a;
  --surface-hi:#262626;
  --text:#ffffff;
  --text-dim:#adaaaa;
  --income:#4ade80;
  --expense:#ff716c;
  --snap:150ms steps(2);
}
body{
  font-family:'Noto Sans SC','Space Grotesk',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  padding-bottom:40px;
}
body::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:
    repeating-linear-gradient(
      -45deg,transparent,transparent 80px,
      rgba(133,207,255,0.03) 80px,rgba(133,207,255,0.03) 81px
    );
  pointer-events:none;z-index:0;
}

.topbar{
  position:sticky;top:0;z-index:50;
  background:#000;
  border-bottom:4px solid var(--primary);
  padding:12px 20px;
  display:flex;justify-content:space-between;align-items:center;
}
.topbar::after{
  content:'';position:absolute;bottom:-8px;left:0;width:100%;height:4px;
  background:var(--secondary);
}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.4rem;color:var(--primary);text-transform:uppercase;letter-spacing:.02em;transform:skewX(-4deg)}

.page-header{
  padding:24px 20px 16px;position:relative;z-index:1;
}
.page-tag{
  display:inline-block;
  background:var(--primary);
  color:#000;
  padding:4px 16px 4px 10px;
  font-weight:800;font-size:.75rem;
  text-transform:uppercase;
  letter-spacing:.1em;
  clip-path:polygon(0 0,100% 0,92% 100%,0 100%);
  margin-bottom:8px;
}
.page-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:2.2rem;font-weight:800;
  transform:skewX(-4deg);
  letter-spacing:-0.03em;
  line-height:1.1;
}
.page-title .accent{color:var(--secondary)}

/* Type toggle */
.type-toggle{
  display:flex;gap:0;margin:0 16px 24px;
  position:relative;z-index:1;
}
.type-btn{
  flex:1;padding:14px 0;
  font-weight:800;font-size:1rem;
  text-align:center;cursor:pointer;
  transition:all var(--snap);
  border:none;
}
.type-btn.expense-btn{
  background:var(--surface);
  color:var(--text-dim);
  clip-path:polygon(0 0,92% 0,100% 100%,0 100%);
  border:3px solid var(--expense);
  border-right:none;
}
.type-btn.income-btn{
  background:var(--surface);
  color:var(--text-dim);
  clip-path:polygon(8% 0,100% 0,100% 100%,0 100%);
  border:3px solid var(--income);
  border-left:none;
}
.type-btn.active.expense-btn{
  background:rgba(255,113,108,0.15);
  color:var(--expense);
}
.type-btn.active.income-btn{
  background:rgba(74,222,128,0.15);
  color:var(--income);
}

/* Amount input */
.amount-section{
  margin:0 16px 28px;position:relative;z-index:1;
}
.amount-box{
  background:var(--surface);
  border:4px solid var(--primary);
  padding:20px;
  position:relative;
  clip-path:polygon(0 0,100% 0,100% 90%,96% 100%,0 100%);
}
.amount-box::before{
  content:'';position:absolute;top:0;left:0;width:6px;height:100%;
  background:repeating-linear-gradient(
    -45deg,var(--primary),var(--primary) 3px,transparent 3px,transparent 9px
  );
}
.amount-label{
  font-size:.7rem;font-weight:700;
  color:var(--secondary);
  text-transform:uppercase;
  letter-spacing:.15em;
  margin-bottom:8px;
}
.amount-input-row{
  display:flex;align-items:baseline;gap:8px;
}
.amount-symbol{
  font-family:'Space Grotesk',sans-serif;
  font-size:2.5rem;font-weight:800;
  color:var(--secondary);
}
.amount-input{
  background:none;border:none;outline:none;
  font-family:'JetBrains Mono','Space Grotesk',monospace;
  font-size:3.5rem;font-weight:700;
  color:var(--text);
  width:100%;
  caret-color:var(--secondary);
}
.amount-input::placeholder{color:var(--text-dim)}

/* Form fields */
.form-section{
  margin:0 16px;position:relative;z-index:1;
  display:flex;flex-direction:column;gap:16px;
}
.form-field{
  position:relative;
}
.field-label{
  position:absolute;top:-10px;left:12px;z-index:2;
  background:var(--secondary);
  color:#000;
  padding:2px 10px;
  font-weight:800;font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  clip-path:polygon(0 0,100% 0,92% 100%,0 100%);
}
.field-box{
  background:var(--surface);
  border:3px solid var(--surface-hi);
  padding:16px;
  clip-path:polygon(0 0,100% 0,100% 92%,97% 100%,0 100%);
  transition:border-color .15s;
}
.field-box:focus-within{
  border-color:var(--primary);
}
.field-input{
  background:none;border:none;outline:none;
  font-size:1rem;font-weight:500;
  color:var(--text);
  width:100%;
}
.field-input::placeholder{color:var(--text-dim)}
.field-hint{
  font-size:.7rem;color:var(--text-dim);margin-top:6px;
}

/* Category picker */
.category-section{
  margin:0 16px 24px;position:relative;z-index:1;
}
.category-label{
  font-size:.75rem;font-weight:700;
  color:var(--primary);
  text-transform:uppercase;
  letter-spacing:.12em;
  margin-bottom:12px;
}
.category-grid{
  display:flex;flex-wrap:wrap;gap:8px;
}
.category-chip{
  padding:8px 16px;
  font-weight:700;font-size:.85rem;
  cursor:pointer;
  transition:all var(--snap);
  border:2px solid var(--surface-hi);
  background:var(--surface);
  color:var(--text-dim);
  clip-path:polygon(6% 0,100% 0,94% 100%,0 100%);
}
.category-chip:hover{
  border-color:var(--primary);
  color:var(--primary);
}
.category-chip.selected{
  background:var(--secondary);
  color:#000;
  border-color:var(--secondary);
  clip-path:polygon(6% 0,100% 0,94% 100%,0 100%);
}

/* Numpad */
.numpad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin:0 16px 24px;
  position:relative;z-index:1;
}
.num-key{
  padding:18px 0;
  font-family:'JetBrains Mono','Space Grotesk',monospace;
  font-weight:700;font-size:1.5rem;
  text-align:center;cursor:pointer;
  background:var(--surface);
  color:var(--primary);
  border:3px solid var(--surface-hi);
  transition:all var(--snap);
}
.num-key:hover{border-color:var(--primary);background:var(--surface-hi)}
.num-key:active{transform:scale(.93) skew(-1deg,0);filter:brightness(.8)}
.num-key:nth-child(1){clip-path:polygon(0 0,100% 8%,95% 100%,0 90%)}
.num-key:nth-child(2){clip-path:polygon(5% 0,95% 0,100% 100%,0 100%)}
.num-key:nth-child(3){clip-path:polygon(0 0,100% 0,100% 90%,95% 8%)}
.num-key:nth-child(4){clip-path:polygon(0 8%,100% 0,100% 92%,5% 100%)}
.num-key:nth-child(5){clip-path:polygon(5% 0,95% 5%,95% 95%,5% 100%)}
.num-key:nth-child(6){clip-path:polygon(0 0,95% 8%,100% 100%,5% 92%)}
.num-key:nth-child(7){clip-path:polygon(0 10%,100% 0,100% 90%,0 100%)}
.num-key:nth-child(8){clip-path:polygon(5% 0,95% 5%,90% 100%,0 95%)}
.num-key:nth-child(9){clip-path:polygon(0 0,100% 5%,95% 100%,5% 95%)}
.num-key.action{
  background:transparent;
  border-color:transparent;
  color:var(--expense);
  font-size:1.2rem;
  clip-path:none!important;
}
.num-key.dot{
  color:var(--secondary);
  clip-path:polygon(10% 0,90% 0,100% 100%,0 100%);
}

/* Confirm button */
.confirm-section{
  margin:0 16px 32px;position:relative;z-index:1;
  display:flex;gap:12px;
}
.btn-cancel{
  flex:1;padding:16px;
  background:var(--surface);
  border:3px solid var(--text-dim);
  color:var(--text-dim);
  font-weight:700;font-size:1rem;
  cursor:pointer;
  clip-path:polygon(0 0,100% 0,97% 100%,0 100%);
  transition:all .1s;
}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}
.btn-confirm{
  flex:2;padding:16px;
  background:var(--secondary);
  border:3px solid #000;
  color:#000;
  font-weight:800;font-size:1.1rem;
  text-transform:uppercase;
  letter-spacing:.05em;
  cursor:pointer;
  clip-path:polygon(0 0,100% 0,96% 100%,3% 100%);
  box-shadow:5px 5px 0 0 var(--primary);
  transition:all .1s;
}
.btn-confirm:hover{transform:translate(1px,1px);box-shadow:4px 4px 0 0 var(--primary)}
.btn-confirm:active{transform:translate(3px,3px) skew(-1deg,0);box-shadow:none}

/* Bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:#000;
  border-top:4px solid var(--primary);
  display:flex;justify-content:space-around;align-items:center;
  height:72px;padding:0 8px;
}
.bottom-nav::before{
  content:'';position:absolute;top:-6px;left:0;width:100%;height:4px;
  background:var(--secondary);
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 12px;cursor:pointer;
  transition:all .1s;color:var(--text-dim);
  position:relative;
}
.nav-item:hover{color:var(--primary)}
.nav-item:active{transform:scale(.9)}
.nav-item.active{color:var(--secondary)}
.nav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.nav-icon svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-item.active .nav-icon svg{stroke-width:3}
.nav-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}

.corner-deco{position:fixed;bottom:100px;left:-30px;z-index:0;width:140px;height:140px;background:var(--secondary);opacity:.05;transform:rotate(-20deg);clip-path:polygon(0 0,100% 0,80% 100%,0 80%);pointer-events:none;animation:corner-drift 8s steps(4) infinite}

@keyframes p5-shake{
  0%,100%{transform:skewX(-4deg) rotate(0deg)}
  25%{transform:skewX(-4deg) rotate(.3deg)}
  50%{transform:skewX(-4deg) rotate(-.2deg)}
  75%{transform:skewX(-4deg) rotate(.15deg)}
}
@keyframes p5-wobble{
  0%,100%{transform:rotate(0deg)}
  20%{transform:rotate(.5deg)}
  40%{transform:rotate(-.4deg)}
  60%{transform:rotate(.3deg)}
  80%{transform:rotate(-.2deg)}
}
@keyframes p5-breathe{
  0%,100%{opacity:1}
  50%{opacity:.85}
}
@keyframes corner-drift{
  0%,100%{transform:rotate(-20deg) translate(0,0)}
  25%{transform:rotate(-18deg) translate(3px,-2px)}
  50%{transform:rotate(-22deg) translate(-2px,3px)}
  75%{transform:rotate(-19deg) translate(2px,1px)}
}
@keyframes nav-active-glow{
  0%,100%{text-shadow:0 0 4px currentColor}
  50%{text-shadow:0 0 10px currentColor,0 0 20px currentColor}
}
@keyframes input-pulse{
  0%,100%{border-color:var(--primary)}
  50%{border-color:var(--secondary)}
}
@keyframes chip-float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-1px)}
}
@keyframes key-breathe{
  0%,100%{opacity:1}
  50%{opacity:.9}
}
@keyframes cursor-blink{
  0%,100%{border-right-color:var(--secondary)}
  50%{border-right-color:transparent}
}

.logo{animation:p5-shake 3s steps(3) infinite}
.page-title{animation:p5-shake 4s steps(4) infinite}
.amount-box{animation:input-pulse 3s steps(4) infinite}
.category-chip:nth-child(odd){animation:chip-float 3s steps(3) infinite}
.category-chip:nth-child(even){animation:chip-float 3.5s steps(3) infinite .3s}
.category-chip.selected{animation:p5-wobble 2.5s steps(4) infinite}
.num-key{animation:key-breathe 4s steps(3) infinite}
.num-key:nth-child(3n+1){animation-delay:0s}
.num-key:nth-child(3n+2){animation-delay:.5s}
.num-key:nth-child(3n){animation-delay:1s}
.nav-item.active .nav-icon{animation:nav-active-glow 2s steps(3) infinite}
.corner-deco{animation:corner-drift 8s steps(4) infinite}
</style>
</head>
<body>

<div class="corner-deco"></div>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:12px">
    <div style="width:32px;height:32px;background:var(--secondary);clip-path:polygon(15% 0,100% 0,85% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:.9rem">A</div>
    <span class="logo">Account Book</span>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <div style="width:8px;height:8px;background:var(--income);clip-path:polygon(50% 0,100% 100%,0 100%)"></div>
    <div style="width:8px;height:8px;background:var(--secondary);clip-path:polygon(50% 0,100% 100%,0 100%)"></div>
    <div style="width:8px;height:8px;background:var(--expense);clip-path:polygon(50% 0,100% 100%,0 100%)"></div>
  </div>
</header>

<div class="page-header">
  <div class="page-tag">// 新记录</div>
  <h1 class="page-title">记一笔 <span class="accent">_</span></h1>
</div>

<!-- Type Toggle -->
<div class="type-toggle">
  <button class="type-btn expense-btn active">&#9650; 支出</button>
  <button class="type-btn income-btn">&#9660; 收入</button>
</div>

<!-- Amount Input -->
<div class="amount-section">
  <div class="amount-box">
    <div class="amount-label">// 金额</div>
    <div class="amount-input-row">
      <span class="amount-symbol">&#165;</span>
      <input class="amount-input" type="text" value="35.00" placeholder="0.00"/>
    </div>
  </div>
</div>

<!-- Category Picker -->
<div class="category-section">
  <div class="category-label">// 分类</div>
  <div class="category-grid">
    <div class="category-chip selected">餐饮</div>
    <div class="category-chip">交通</div>
    <div class="category-chip">购物</div>
    <div class="category-chip">娱乐</div>
    <div class="category-chip">住房</div>
    <div class="category-chip">医疗</div>
    <div class="category-chip">教育</div>
    <div class="category-chip">通讯</div>
    <div class="category-chip">+ 新增</div>
  </div>
</div>

<!-- Form Fields -->
<div class="form-section">
  <div class="form-field">
    <div class="field-label">日期</div>
    <div class="field-box">
      <input class="field-input" type="text" value="2026-04-15" placeholder="选择日期"/>
    </div>
  </div>
  <div class="form-field">
    <div class="field-label">备注</div>
    <div class="field-box">
      <input class="field-input" type="text" placeholder="午餐 - 沙县小吃" value="午餐 - 沙县小吃"/>
    </div>
  </div>
</div>

<!-- Numpad -->
<div class="numpad">
  <div class="num-key">1</div>
  <div class="num-key">2</div>
  <div class="num-key">3</div>
  <div class="num-key">4</div>
  <div class="num-key">5</div>
  <div class="num-key">6</div>
  <div class="num-key">7</div>
  <div class="num-key">8</div>
  <div class="num-key">9</div>
  <div class="num-key action">&#9003;</div>
  <div class="num-key">0</div>
  <div class="num-key dot">.</div>
</div>

<!-- Confirm -->
<div class="confirm-section">
  <button class="btn-cancel">取消</button>
  <button class="btn-confirm">确认记录 &#9655;</button>
</div>

<nav class="bottom-nav">
  <div class="nav-item">
    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg></span>
    <span class="nav-label">总览</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h10M4 18h7"/></svg></span>
    <span class="nav-label">明细</span>
  </div>
  <div class="nav-item active">
    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span>
    <span class="nav-label">记账</span>
  </div>
  <div class="nav-item">
    <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
    <span class="nav-label">设置</span>
  </div>
</nav>
<script>
const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(type){
  if(AC.state==='suspended')AC.resume();
  const t=AC.currentTime;
  const g=AC.createGain();
  g.connect(AC.destination);
  if(type==='key'){
    const o=AC.createOscillator();o.type='square';o.frequency.setValueAtTime(1200,t);o.frequency.exponentialRampToValueAtTime(600,t+.04);
    g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);
    o.connect(g);o.start(t);o.stop(t+.04);
  }else if(type==='dot'){
    const o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(800,t);o.frequency.setValueAtTime(1000,t+.02);
    g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.05);
    o.connect(g);o.start(t);o.stop(t+.05);
  }else if(type==='del'){
    const o=AC.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(100,t+.08);
    g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);
    o.connect(g);o.start(t);o.stop(t+.08);
  }else if(type==='chip'){
    const o=AC.createOscillator();o.type='triangle';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(1200,t+.03);
    g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);
    o.connect(g);o.start(t);o.stop(t+.04);
  }else if(type==='toggle'){
    const o=AC.createOscillator();o.type='square';o.frequency.setValueAtTime(500,t);o.frequency.exponentialRampToValueAtTime(1000,t+.03);o.frequency.exponentialRampToValueAtTime(700,t+.06);
    g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);
    o.connect(g);o.start(t);o.stop(t+.06);
  }else if(type==='confirm'){
    const o1=AC.createOscillator();o1.type='square';o1.frequency.setValueAtTime(500,t);
    const o2=AC.createOscillator();o2.type='square';o2.frequency.setValueAtTime(700,t+.05);
    const o3=AC.createOscillator();o3.type='square';o3.frequency.setValueAtTime(1000,t+.1);
    g.gain.setValueAtTime(.15,t);g.gain.setValueAtTime(.15,t+.1);g.gain.exponentialRampToValueAtTime(.001,t+.18);
    o1.connect(g);o2.connect(g);o3.connect(g);o1.start(t);o1.stop(t+.05);o2.start(t+.05);o2.stop(t+.1);o3.start(t+.1);o3.stop(t+.18);
  }else if(type==='cancel'){
    const o=AC.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(200,t+.1);
    g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);
    o.connect(g);o.start(t);o.stop(t+.1);
  }else if(type==='nav'){
    const o1=AC.createOscillator();o1.type='square';o1.frequency.setValueAtTime(1800,t);
    const o2=AC.createOscillator();o2.type='sine';o2.frequency.setValueAtTime(900,t+.015);
    const g2=AC.createGain();g2.connect(AC.destination);g2.gain.setValueAtTime(.06,t+.015);g2.gain.exponentialRampToValueAtTime(.001,t+.07);
    o2.connect(g2);
    g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.015);
    o1.connect(g);o1.start(t);o1.stop(t+.015);o2.start(t+.015);o2.stop(t+.07);
  }else if(type==='field'){
    const o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(1200,t+.03);
    g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.03);
    o.connect(g);o.start(t);o.stop(t+.03);
  }
}
document.querySelectorAll('.num-key:not(.action):not(.dot)').forEach(el=>el.addEventListener('pointerdown',()=>snd('key')));
document.querySelectorAll('.num-key.dot').forEach(el=>el.addEventListener('pointerdown',()=>snd('dot')));
document.querySelectorAll('.num-key.action').forEach(el=>el.addEventListener('pointerdown',()=>snd('del')));
document.querySelectorAll('.category-chip').forEach(el=>el.addEventListener('pointerdown',()=>snd('chip')));
document.querySelectorAll('.type-btn').forEach(el=>el.addEventListener('pointerdown',()=>snd('toggle')));
document.querySelectorAll('.btn-confirm').forEach(el=>el.addEventListener('pointerdown',()=>snd('confirm')));
document.querySelectorAll('.btn-cancel').forEach(el=>el.addEventListener('pointerdown',()=>snd('cancel')));
document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('pointerdown',()=>snd('nav')));
document.querySelectorAll('.field-box').forEach(el=>el.addEventListener('pointerdown',()=>snd('field')));
</script>
